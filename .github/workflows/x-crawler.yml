name: X (Twitter) Hashtag Crawler

on:
  schedule:
    - cron: '*/10 * * * *'  # 10분 단위 실행
  workflow_dispatch:        # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 크롤러 기동에 필수적인 Supabase 및 RSS 파서 패키지만 독립 설치 (피어 의존성 충돌 회피)
      - name: Install dependencies
        run: |
          npm install @supabase/supabase-js node-fetch xml2js --no-save

      - name: Run Crawler Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/x-crawler.cjs
